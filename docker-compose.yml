services:
  backend:
    restart: always
    links:
      - db
    ports:
      - "3000"
    volumes:
      - app-data:/app/public/images
  
  db:
    image: "mariadb"
    restart: always
    links:
      - phpmyadmin
    ports:
      - "3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=training
      - MYSQL_USER=peserta
      - MYSQL_PASSWORD=password
    volumes:
    - ./app/database/:/docker-entrypoint-initdb.d
    - db-data:/var/lib/mysql
    
  phpmyadmin:
    image: "phpmyadmin"
    restart: always
    ports:
      - "8010:80"
    environment:
      - PMA_HOST=db

  web:
    build: ./nginx
    restart: always
    ports:
    - "80:80"
    depend_on:
    - backend

volumes:
  app-data:
  db-data: